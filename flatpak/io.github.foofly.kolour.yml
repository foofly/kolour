app-id: io.github.foofly.kolour
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: kolour-launcher

# kolour orchestrates host KDE binaries (plasma-apply-colorscheme,
# kreadconfig6, kwriteconfig6, dbus-send, plasma-apply-lookandfeel,
# systemctl --user, optionally matugen). None ship inside the runtime; we
# escape the sandbox via flatpak-spawn --host for every external call.
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=session-bus
  - --filesystem=home
  # Allow host-process spawning so kolour can call plasma-apply-colorscheme etc.
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.kde.*
  - --talk-name=org.freedesktop.systemd1
  - --device=dri

modules:
  - name: kolour
    buildsystem: simple
    build-commands:
      # PySide6 is provided by org.kde.Platform 6.x — no pip install needed.
      - install -d /app/lib/kolour /app/bin /app/share/applications /app/share/metainfo /app/share/icons/hicolor/scalable/apps /app/share/kolour
      - cp -r src/kolour /app/lib/kolour/
      - install -m 0755 flatpak/kolour-launcher /app/bin/kolour-launcher
      - install -m 0644 flatpak/io.github.foofly.kolour.desktop /app/share/applications/io.github.foofly.kolour.desktop
      - install -m 0644 flatpak/io.github.foofly.kolour.metainfo.xml /app/share/metainfo/io.github.foofly.kolour.metainfo.xml
      - install -m 0644 flatpak/icons/io.github.foofly.kolour.svg /app/share/icons/hicolor/scalable/apps/io.github.foofly.kolour.svg
    sources:
      - type: dir
        path: ..
